<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: linear-gradient(90deg, #0066cc, #003366);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #0066cc;
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.3);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0066cc, #00aaff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
            box-shadow: 0 0 15px rgba(0, 102, 204, 0.6);
        }
        .logo h1 {
            font-size: 24px;
            color: #00aaff;
            font-weight: 600;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #00aaff;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff88;
            animation: blink 2s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .msg {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            animation: pop 0.3s ease-out;
        }
        @keyframes pop {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.user {
            align-self: flex-end;
            background: #0066cc;
            color: white;
            border-radius: 18px 18px 4px 18px;
        }
        .msg.ai {
            align-self: flex-start;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 18px 18px 18px 4px;
            color: #e0e0e0;
        }
        .typing {
            display: flex;
            gap: 6px;
            padding: 14px 18px;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #00aaff;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .input-area {
            padding: 20px;
            background: #0a0a0f;
            display: flex;
            gap: 10px;
            border-top: 1px solid #222;
        }
        #user-input {
            flex: 1;
            background: #151520;
            border: 1px solid #333;
            color: #fff;
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        #user-input:focus {
            border-color: #0066cc;
        }
        .send-btn {
            background: linear-gradient(135deg, #0066cc, #00aaff);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.5);
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #0066cc; }

        @media (max-width: 600px) {
            .msg { max-width: 90%; }
            .logo h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">C</div>
            <h1>Copilot</h1>
        </div>
        <div class="status">
            <div class="status-dot"></div>
            <span>Listo para ayudarte</span>
        </div>
    </header>

    <div id="chat-container">
        <div class="msg ai">
            Hola, soy Copilot. Puedo ayudarte con cualquier cosa: código, preguntas, recetas, análisis, lo que necesites. ¿Qué te trae hoy?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Pregúntame algo..." onkeypress="handleKey(event)">
        <button class="send-btn" onclick="sendMessage()" id="send-btn">↑</button>
    </div>

    <script>
        const chat = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                sendMessage();
            }
        }

        function addMessage(type, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'msg ai typing';
            div.id = 'typing';
            div.innerHTML = '<span></span><span></span><span></span>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function generateResponse(userText) {
            const lower = userText.toLowerCase();

            // Recetas
            if (lower.includes('torta') && lower.includes('tres leches')) {
                return `**Torta de Tres Leches**

Ingredientes:
- 1 taza de harina
- 4 huevos
- 1 taza azúcar
- 1 taza leche condensada
- 1 taza leche evaporada
- 1 taza crema de leche
- Vainilla al gusto

Preparación:
1. Bate huevos con azúcar hasta punto de nieve
2. Incorpora harina suavemente
3. Hornea a 180°C por 25-30 min
4. Mezcla las tres leches
5. Vierte la mezcla sobre la torta tibia
6. Refrigera 4 horas
7. Cubre con crema batida

Listo. Clásico y delicioso.`;
            }

            if (lower.includes('receta')) {
                return `Cuéntame qué quieres cocinar. Puedo ayudarte con ingredientes, pasos, tiempos y tips. ¿Qué es?`;
            }

            // Código
            if (lower.includes('código') || lower.includes('python') || lower.includes('javascript')) {
                return `Dime exactamente qué quieres hacer. ¿Una función? ¿Un script? ¿Una app? Necesito detalles para darte código útil.`;
            }

            if (lower.includes('hola') || lower.includes('hi')) {
                return `Hey, ¿qué necesitas?`;
            }

            if (lower.includes('gracias')) {
                return `De nada. ¿Algo más?`;
            }

            if (lower.includes('cómo estás')) {
                return `Aquí ando, listo para ayudarte. ¿Qué necesitas?`;
            }

            // General
            return `Te ayudo si me das más detalles. ¿Qué exactamente quieres saber o hacer?`;
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';
            sendBtn.disabled = true;

            showTyping();

            setTimeout(() => {
                removeTyping();
                const response = generateResponse(text);
                addMessage('ai', response);
                sendBtn.disabled = false;
                input.focus();
            }, 1000 + Math.random() * 500);
        }

        input.focus();
    </script>
</body>
</html>
