<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fff;
            color: #0d0d0d;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: #fff;
            border-right: 1px solid #d1d5db;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 16px;
        }

        .new-chat-btn {
            background: #fff;
            color: #0d0d0d;
            border: 1px solid #d1d5db;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: #f7f7f8;
            border-color: #8b8b8b;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            background: transparent;
            border: none;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
            transition: all 0.2s;
            color: #0d0d0d;
        }

        .history-item:hover {
            background: #f7f7f8;
        }

        .history-item.active {
            background: #e5e5ea;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #fff;
            padding: 16px;
            border-bottom: 1px solid #d1d5db;
            text-align: center;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #0d0d0d;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            justify-content: flex-end;
        }

        .msg.user .content {
            background: #10a37f;
            color: white;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .msg.ai {
            justify-content: flex-start;
        }

        .msg.ai .avatar {
            width: 32px;
            height: 32px;
            background: #10a37f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }

        .msg.ai .content {
            background: #f7f7f8;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .input-area {
            padding: 16px 20px 20px;
            background: #fff;
            border-top: 1px solid #d1d5db;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
        }

        #user-input {
            flex: 1;
            background: #f7f7f8;
            border: 1px solid #d1d5db;
            color: #0d0d0d;
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
            max-height: 100px;
        }

        #user-input:focus {
            border-color: #10a37f;
        }

        .send-btn {
            background: #10a37f;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #0d8f6f;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f7f7f8; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #bfbfbf; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .msg.user .content { max-width: 85%; }
            .msg.ai .content { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <button class="new-chat-btn" onclick="newChat()">
            <span>+</span> Nuevo chat
        </button>
        <div class="history-list" id="history-list"></div>
    </div>

    <div class="main-container">
        <header>
            <h1>ChatGPT</h1>
        </header>

        <div id="chat-container"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Escribe tu pregunta..." onkeypress="handleKey(event)">
                <button class="send-btn" onclick="sendMessage()" id="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const historyList = document.getElementById('history-list');

        let chats = JSON.parse(localStorage.getItem('chatgpt_chats')) || [];
        let currentChatId = null;

        function generateId() {
            return Date.now().toString();
        }

        function loadChats() {
            chats = JSON.parse(localStorage.getItem('chatgpt_chats')) || [];
            updateHistoryUI();
        }

        function updateHistoryUI() {
            historyList.innerHTML = '';
            chats.forEach(c => {
                const div = document.createElement('button');
                div.className = 'history-item' + (c.id === currentChatId ? ' active' : '');
                div.textContent = c.title || 'Chat sin título';
                div.onclick = () => loadChat(c.id);
                historyList.appendChild(div);
            });
        }

        function saveChat() {
            if (currentChatId) {
                const chatData = chats.find(c => c.id === currentChatId);
                if (chatData) {
                    const messages = Array.from(document.querySelectorAll('.msg'));
                    const firstMsg = messages.find(m => m.classList.contains('user'));
                    if (firstMsg) {
                        chatData.title = firstMsg.textContent.substring(0, 40);
                    }
                }
                localStorage.setItem('chatgpt_chats', JSON.stringify(chats));
            }
        }

        function newChat() {
            const id = generateId();
            chats.push({ id, title: 'Nuevo chat', messages: [] });
            currentChatId = id;
            chat.innerHTML = '';
            updateHistoryUI();
            input.focus();
        }

        function loadChat(id) {
            currentChatId = id;
            const chatData = chats.find(c => c.id === id);
            if (chatData) {
                chat.innerHTML = '';
                chatData.messages.forEach(msg => {
                    addMessageToUI(msg.type, msg.text);
                });
            }
            updateHistoryUI();
            input.focus();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function addMessageToUI(type, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;

            if (type === 'ai') {
                div.innerHTML = `<div class="avatar">✓</div><div class="content">${text}</div>`;
            } else {
                div.innerHTML = `<div class="content">${text}</div>`;
            }

            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function addMessage(type, text) {
            if (!currentChatId) {
                newChat();
            }

            addMessageToUI(type, text);

            const chatData = chats.find(c => c.id === currentChatId);
            if (chatData) {
                chatData.messages.push({ type, text });
                saveChat();
            }
        }

        function generateResponse(userText) {
            const lower = userText.toLowerCase();

            if (lower.includes('hola')) {
                return 'Hola, ¿cómo estás? ¿En qué puedo ayudarte?';
            }

            if (lower.includes('torta') && lower.includes('tres leches')) {
                return `Torta de Tres Leches

Ingredientes:
- 1 taza harina
- 4 huevos
- 1 taza azúcar
- 1 taza leche condensada
- 1 taza leche evaporada
- 1 taza crema de leche
- Vainilla

Preparación:
1. Bate huevos con azúcar hasta punto de nieve
2. Incorpora la harina suavemente
3. Hornea a 180°C por 25-30 minutos
4. Mezcla las tres leches juntas
5. Vierte la mezcla sobre la torta mientras esté tibia
6. Refrigera durante 4 horas
7. Cubre con crema batida antes de servir`;
            }

            if (lower.includes('receta')) {
                return 'Claro, dime qué quieres cocinar y te doy la receta con ingredientes y pasos.';
            }

            if (lower.includes('código') || lower.includes('python') || lower.includes('javascript') || lower.includes('html')) {
                return 'Dime exactamente qué código necesitas y te lo proporciono.';
            }

            if (lower.includes('gracias')) {
                return 'De nada, ¿hay algo más en lo que pueda ayudarte?';
            }

            if (lower.includes('cuéntame')) {
                return 'Me encantaría saber más. ¿Sobre qué tema específico quieres que te cuente?';
            }

            return 'Entendido. Dime más sobre lo que necesitas y haré mi mejor esfuerzo para ayudarte.';
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';
            sendBtn.disabled = true;

            setTimeout(() => {
                const response = generateResponse(text);
                addMessage('ai', response);
                sendBtn.disabled = false;
                input.focus();
                updateHistoryUI();
            }, 800 + Math.random() * 400);
        }

        loadChats();
        if (chats.length === 0) {
            newChat();
        } else {
            loadChat(chats[0].id);
        }

        input.focus();
    </script>
</body>
</html>
